<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/webp" id="favicon" href="carritoclaro.webp" />
  <script>
    (function () {
      var favicon = document.getElementById('favicon');
      function setIcon(dark) {
        favicon.href = dark ? 'carritooscuro.webp' : 'carritoclaro.webp';
      }
      var mq = window.matchMedia('(prefers-color-scheme: dark)');
      setIcon(mq.matches);
      mq.addEventListener('change', function (e) { setIcon(e.matches); });
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>donemilio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="src/main.jsx"></script>
</body>

</html>
