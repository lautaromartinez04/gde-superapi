services:
  superapi:
    # build: .                          # build local desde el Dockerfile
    image: ghcr.io/lautaromartinez04/gde-superapi:1.3.0  # Versión estable 1.3.0 (v1.2.1)
    container_name: superapi

    # ── Reinicio automático ───────────────────────────────────────────
    restart: unless-stopped

    # ── Variables de entorno (el .env real vive solo en el servidor) ──
    env_file:
      - .env

    # ── Puertos ──────────────────────────────────────────────────────
    ports:
      - "6500:6500"

    # ── Volúmenes persistentes ────────────────────────────────────────
    volumes:
      # Carpeta de uploads vinculada localmente
      - ./uploads:/app/uploads
      # SPAs compiladas — montar directorios locales (creados via npm run build:api) para deploy rápido
      - ./grupo-don-emilio:/app/grupo-don-emilio
      - ./donemilio:/app/donemilio
      - ./duyamis:/app/duyamis
      - ./mharnes:/app/mharnes

    # ── Healthcheck ──────────────────────────────────────────────────
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6500/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    # ── Logging ──────────────────────────────────────────────────────
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

